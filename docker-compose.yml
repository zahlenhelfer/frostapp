services:
  api:
    image: ghcr.io/zahlenhelfer/frostapp-api:latest
    container_name: frostapp-api
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - ALLOWED_ORIGINS=http://localhost:8080,http://localhost:3000,http://localhost:4200
    volumes:
      - frostapp-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/zahlenhelfer/frostapp-frontend:latest
    container_name: frostapp-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - api

  # Combined single-container deployment (alternative)
  # Uncomment if you want both in one container
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.combined
  #   container_name: frostapp
  #   ports:
  #     - "8080:80"
  #   restart: unless-stopped

volumes:
  frostapp-data:
    driver: local
